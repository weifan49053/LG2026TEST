<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LG TV 專業培訓挑戰賽</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #121212; color: #FFFFFF;
      font-family: 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }
    header { text-align: center; margin-bottom: 20px; }
    h1 { font-size: 2.5rem; margin-bottom: 10px; color: #A50034; text-shadow: 0 0 10px rgba(165,0,52,0.5); }
    .status-container { display: flex; gap: 30px; justify-content: center; }
    .board { font-size: 1.8rem; background: #222; padding: 10px 30px; border-radius: 50px; border: 2px solid #444; }
    .warning { border-color: #ff3333; color: #ff3333; animation: blink 1s infinite; }
    .game-board {
      width: 90vw; max-width: 1200px; height: 65vh;
      display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr);
      gap: 20px; perspective: 1000px;
    }
    .card {
      position: relative; width: 100%; height: 100%; cursor: pointer;
      transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .card:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,255,255,0.4); border-radius: 15px; }
    .card.flip { transform: rotateY(180deg); }
    .card.matched { opacity: 0.3; pointer-events: none; }
    .card-face {
      position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center;
      border-radius: 15px; font-size: 1.4rem; font-weight: bold; text-align: center;
      padding: 10px; white-space: pre-line; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .card-back { background: linear-gradient(135deg, #A50034 0%, #7a0026 100%); color: white; font-size: 2rem; border: 2px solid #ff4d79; }
    .card-front { background-color: #2A2A2A; color: #EEE; transform: rotateY(180deg); border: 2px solid #555; }
    .modal {
      display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95); padding: 50px; border-radius: 30px; text-align: center; border: 2px solid #444;
    }
    button { margin-top: 20px; padding: 15px 40px; font-size: 1.5rem; background: #A50034; color: white; border: none; border-radius: 10px; cursor: pointer; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>

  <header>
    <h1>LG TV 專業培訓挑戰賽</h1>
    <div class="status-container">
      <div class="board">配對: <span id="score">0</span>/6</div>
      <div class="board" id="timerBoard">時間: <span id="timer">90</span>s</div>
    </div>
  </header>

  <div class="game-board" id="gameBoard"></div>

  <div class="modal" id="modal">
    <h2 id="modalTitle">挑戰成功！</h2>
    <p id="modalText"></p>
    <button onclick="location.reload()">重新挑戰</button>
  </div>

  <script>
    const questionPool = [
      { spec: 'Micro RGB evo', feature: '新世代液晶顯示技術\nRGB原色技術提供豐富色彩' },
      { spec: 'LG OLED evo', feature: '自體發光像素\n完美純黑，生動且鮮明' },
      { spec: 'OLED83W6', feature: '9.9mm 壁畫式設計\n搭載極光煥彩顯色技術' },
      { spec: 'Mini LED 精準控光', feature: '提升對比度\n呈現更細膩的畫面細節' },
      { spec: '真無線傳輸技術', feature: '擺脫繁雜線材\n所有設備完美整合' },
      { spec: '低藍光護眼認證', feature: '長時間觀影\n依然不疲勞' },
      { spec: 'α11 AI 影音晶片', feature: '提升清晰度與質感\n呈現銳利、自然的畫質' },
      { spec: 'AI HDR 畫質重塑', feature: '自動優化色彩、亮度對比\n賦予影像層次與真實感' },
      { spec: 'webOS Re:New 5年升級', feature: '享受最新功能與服務\n並維持高安全性' },
      { spec: 'AI 智慧滑鼠遙控器', feature: '陀螺儀精準定位\n操作直覺便利' },
      { spec: '雙 AI 智慧搜尋', feature: '支援 Gemini 與 Copilot\n複雜搜尋輕鬆搞定' },
      { spec: 'LG Channels', feature: '無需訂閱\n即可觀看新聞與戲劇' },
      { spec: 'StanbyME 2', feature: '內建電池、可拆卸螢幕\n多種觀看方式' },
      { spec: '31.5 吋 4K 觸控', feature: '斜槓機\n多功能觸控螢幕' },
      { spec: '極光煥彩顯色技術', feature: '峰值亮度提升 3.9 倍\n前所未見的畫質' },
      { spec: '純淨黑抗反光技術', feature: '反射降至最低\n維持完美純黑與色彩' }
    ];

    let score = 0, timeLeft = 90, lock = false, hasFlipped = false, first, second, timer;

    function init() {
      const selected = questionPool.sort(() => 0.5 - Math.random()).slice(0, 6);
      let cards = [];
      selected.forEach((q, i) => {
        cards.push({ id: i, text: q.spec }, { id: i, text: q.feature });
      });
      cards.sort(() => 0.5 - Math.random());
      
      const board = document.getElementById('gameBoard');
      cards.forEach(c => {
        const div = document.createElement('div');
        div.className = 'card'; div.dataset.id = c.id;
        div.innerHTML = `<div class="card-face card-front">${c.text}</div><div class="card-face card-back">LG</div>`;
        div.onclick = flip;
        board.appendChild(div);
      });
    }

    function flip() {
      if (lock || this.classList.contains('flip')) return;
      if (!timer && score === 0) startTimer();
      this.classList.add('flip');
      if (!hasFlipped) { hasFlipped = true; first = this; return; }
      second = this;
      check();
    }

    function check() {
      lock = true;
      if (first.dataset.id === second.dataset.id) {
        score++; document.getElementById('score').innerText = score;
        first.classList.add('matched'); second.classList.add('matched');
        reset(); if (score === 6) win();
      } else {
        setTimeout(() => { first.classList.remove('flip'); second.classList.remove('flip'); reset(); }, 2500);
      }
    }

    function startTimer() {
      timer = setInterval(() => {
        timeLeft--; document.getElementById('timer').innerText = timeLeft;
        if (timeLeft <= 15) document.getElementById('timerBoard').classList.add('warning');
        if (timeLeft <= 0) { clearInterval(timer); showModal('時間到！', '很可惜，時間用完了。'); }
      }, 1000);
    }

    function reset() { [hasFlipped, lock, first, second] = [false, false, null, null]; }
    function win() { clearInterval(timer); showModal('挑戰成功！', `太強了！僅用 ${90-timeLeft} 秒完成。`); }
    function showModal(t, txt) { document.getElementById('modalTitle').innerText = t; document.getElementById('modalText').innerText = txt; document.getElementById('modal').style.display = 'block'; }
    
    init();
  </script>
</body>
</html>
